name: "Build and populate cache"
on:
  schedule:
    - cron: '44 */3 * * *'
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
        cachixName:
          - mio-repo
        nixPath:
          - nixpkgs=https://github.com/NixOS/nixpkgs/archive/refs/heads/nixos-unstable.tar.gz
    runs-on: "${{ matrix.os }}"
    steps:
    - run: sudo sysctl kernel.apparmor_restrict_unprivileged_userns=0
      if: runner.os == 'Linux'
    - run: sudo sysctl kernel.apparmor_restrict_unprivileged_unconfined=0
      if: runner.os == 'Linux'
    - run: sudo sysctl kernel.unprivileged_userns_clone=1
      if: runner.os == 'Linux'
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Install nix
      uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b
      with:
        nix_path: "${{ matrix.nixPath }}"
        extra_nix_config: |
          experimental-features = nix-command flakes
          access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
          trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= mio.cachix.org-1:FlupyyLPURqwdRqtPT/LBWKsXY7JKsDkzZQo2K6LeMM= mio-cache.cachix.org-1:ouuIJZ59HIflYjpLW6DRyMc1c+6r3kC/LHuqGUsWigg= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= chaotic-nyx.cachix.org-1:HfnXSw4pj95iI/n17rIDy40agHj12WfF+Gqk6SonIT8= staging.cachix.org-1:WX63nyFdVdWGn6n59pIYwkcH/AtjJGjvMQFKlI2z00w= cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=
          substituters = https://mio.cachix.org/ https://mio-cache.cachix.org/ https://nix-community.cachix.org/ https://chaotic-nyx.cachix.org/ https://cache.nixos.org/ https://staging.cachix.org/ https://cache.garnix.io
          system-features = gccarch-x86-64-v3 benchmark big-parallel kvm nixos-test uid-range
    - name: Setup cachix
      uses: cachix/cachix-action@v16
      # Don't replace <YOUR_CACHIX_NAME> here!
      if: ${{ matrix.cachixName != '<YOUR_CACHIX_NAME>' }}
      with:
        name: ${{ matrix.cachixName }}
        signingKey: '${{ secrets.CACHIX_SIGNING_KEY }}'
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
    - name: Determine system architecture
      run: |
        if [[ "${{ runner.os }}" == "macOS" ]]; then
          if [[ "${{ runner.arch }}" == "ARM64" ]]; then
            SYSTEM="aarch64-darwin"
          else
            SYSTEM="x86_64-darwin"
          fi
        elif [[ "${{ runner.arch }}" == "ARM64" ]]; then
          SYSTEM="aarch64-linux"
        else
          SYSTEM="x86_64-linux"
        fi
        echo "SYSTEM=$SYSTEM" >> $GITHUB_ENV
        echo "Building for system: $SYSTEM"
    # https://github.com/nix-community/nixos-apple-silicon/blob/7aad69158fc1b5bbbddac19040b6aae14daaa35c/.github/workflows/cache.yml#L45C56-L50C24
    # add timeout less than github hard timeout so there is time to upload cache.
    - name: Build nix packages
      if: runner.os == 'Linux'
      run: |
        timeout --foreground 5h nix run nixpkgs#nix-fast-build -- --max-jobs 1 \
          --no-nom \
          -f .#packages.${{ env.SYSTEM }} ${{ matrix.nixpkgs-override }}
    - name: Build nix packages
      if: runner.os != 'Linux'
      run: |
        nix run nixpkgs#nix-fast-build -- --max-jobs 1 \
          --no-nom \
          -f .#packages.${{ env.SYSTEM }} ${{ matrix.nixpkgs-override }}
